<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            font-family: sans-serif;
        }

        .inputFields {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            background: rgba(0, 0, 0, 0.75);
            text-align: center;
            z-index: 20;
            color: white;
        }

        .inputFields input {
            padding: 6px 10px;
            font-size: 1em;
            margin: 2px;
        }

        #stateText {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        #zona {
            position: relative;
            aspect-ratio: 9/16;
            height: 85vh;
            margin: 120px auto 0;
            background: #000000;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            z-index: 1;
        }

        /* COMENTARIOS */
        .comment {
            position: absolute;
            padding: 8px 14px;
            background: rgba(255, 255, 0, 0.85);
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeUp 3s forwards;
        }

        .comment img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }

            15% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        /* LLUVIA GENERAL */
        .rosquilla-item,
        .quiereme-item,
        .avena-item,
        .agua-item,
        .celula-profile {
            position: absolute;
            pointer-events: none;
            user-select: none;
            animation: fall linear forwards;
            z-index: 10;
        }

        @keyframes fall {
            0% {
                transform: translateY(-150px) rotate(0deg);
            }

            100% {
                transform: translateY(calc(100vh + 150px)) rotate(1080deg);
            }
        }

        /* CÉLULAS */
        .celula-profile {
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.4);
            animation: celulaFall linear forwards;
        }

        @keyframes celulaFall {
            0% {
                transform: translateY(-120px) rotate(0deg) scale(0.6);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) scale(1);
                opacity: 0.7;
            }
        }

        /* NOMBRE CENTRO */
        .gift-sender {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            font-weight: 900;
            color: #FF4500;
            text-shadow: 0 0 20px #fff, 0 0 40px #FF4500, 0 0 80px #FF4500;
            z-index: 15;
            pointer-events: none;
            animation: popName 4s forwards;
            white-space: nowrap;
        }

        @keyframes popName {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }

            75% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* TEXTOS ABAJO */
        .bottom-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 25;
            pointer-events: none;
            width: 90%;

        .countdown-number {

        .descanso-text {
            font-size: 1.9em;
            font-weight: 900;
            color: white;
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;

        @keyframes bottomFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            10% {
                opacity: 1;
                transform: translateY(0);
            }

            90% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;

        @keyframes pulse {

                transform: scale(1);
            }

        @keyframes mewingDrop {
            0% {
                top: -300px;
                opacity: 0;
                transform: translateX(-50%) scale(0.6);
            }

            }

            100% {

                opacity: 0;

        /* BANDERAS */
        .flags-container {

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 20;

        }

        #leftFlagsContainer {
            left: 10px;
            transform-origin: center left;
        }

        #rightFlagsContainer {
            right: 10px;

            align-items: flex-end;

        }

        .flag-item {
            display: flex;
            align-items: center;
            gap: 0;
            height: 11%;

        .flag-item img:first-child {
            width: 7.5vh;
            height: 7.5vh;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            cursor: move;
            border: 2px solid white;
        }

        .flag-item .counter {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 4.5vh;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            transition: transform 0.1s;
            pointer-events: none;
            min-width: 40px;
            text-align: center;
            margin: 0 -15px;
        }

        .flag-particle {
            position: absolute;
            z-index: 30;
            pointer-events: none;
            font-size: 40px;
            animation: particlePop 0.8s ease-out forwards;
        }

        @keyframes particlePop {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translate(calc(var(--tx)*0.5), calc(var(--ty)*0.5)) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        @keyframes lavaPulse {
            0% {
                box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.8), 0 0 30px 10px rgba(255, 165, 0, 0.6);

                box-shadow: 0 0 25px 10px rgba(255, 140, 0, 0.9), 0 0 50px 20px rgba(255, 255, 0, 0.7);
                border-color: #ffff00;
            }

            100% {
                box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.8), 0 0 30px 10px rgba(255, 165, 0, 0.6);
                border-color: #ff0000;
            }
        }

        .leader-flag img:first-child {
            border-color: transparent !important;

        }

        /* NUEVOS ESTILOS */
        .aviso-pais {
            color: yellow;
            font-size: 1.4vh;
            font-weight: 900;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;

            pointer-events: none;

        .aviso-pais.fade-out {
            opacity: 0;
            transition: opacity 1s;

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .custom-timer {
            position: absolute;
            color: white;
            font-size: 6vh;
            font-weight: 900;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 40;
            cursor: move;
            user-select: none;
        }

        /* PODIO */
        .podio-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;

        .podio-flex {

            justify-content: center;
            align-items: flex-end;

            margin-top: 20px;

        .podio-col.p2 {
            animation-delay: 0.6s;
        }

        .podio-col.p1 {
            animation-delay: 1.2s;
        }

        .podio-col.p3 {
            animation-delay: 0s;
        }

        @keyframes slideUpPodio {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.is-fullscreen .inputFields {
            display: none !important;
        }

        body.is-fullscreen #camSettingsPanel {
            display: none !important;
        }

        body.is-fullscreen #exitFullscreenBtn {
            display: block !important;
        }

        .mobile-selected {
            outline: 3px dashed #00FF00 !important;
            background: rgba(0, 255, 0, 0.2) !important;
            z-index: 9999 !important;
            border-radius: 10px;
        }

        .draggable-item {
            cursor: move;
        }

        /* MVP Y FUEGOS ARTIFICIALES */
        .mvp-rain-item {
            position: absolute;
            color: #FFD700;
            font-size: 3vh;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, 0 0 10px #FFD700;
            animation: fallRain 4s linear forwards;
            pointer-events: none;
            z-index: 200;
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
            animation: explode 1s ease-out forwards;
        }

        @keyframes fallRain {
            0% {
                transform: translateY(-50px);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(15);
                opacity: 0;
            }
        @keyframes tremble {
            0% { transform: translateX(-50%) translate(1px, 1px) rotate(0deg); }
            10% { transform: translateX(-50%) translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translateX(-50%) translate(-3px, 0px) rotate(1deg); }
            30% { transform: translateX(-50%) translate(3px, 2px) rotate(0deg); }
            40% { transform: translateX(-50%) translate(1px, -1px) rotate(1deg); }
            50% { transform: translateX(-50%) translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translateX(-50%) translate(-3px, 1px) rotate(0deg); }
            70% { transform: translateX(-50%) translate(3px, 1px) rotate(-1deg); }
            80% { transform: translateX(-50%) translate(-1px, -1px) rotate(1deg); }
            90% { transform: translateX(-50%) translate(1px, 2px) rotate(0deg); }
            100% { transform: translateX(-50%) translate(1px, -2px) rotate(-1deg); }
        }

        .trembling-red {
            color: #FF0000 !important;
            text-shadow: 0 0 20px #FF0000, 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000 !important;
            animation: tremble 0.1s infinite !important;
            border-color: #FF0000 !important;
            box-shadow: 0 0 30px #FF0000 !important;
        }
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDfwD9MTER5OXt4CRVteqieY1gVLgz6CYQ",
            authDomain: "paisesrapeo.firebaseapp.com",
            databaseURL: "https://paisesrapeo-default-rtdb.firebaseio.com",
            projectId: "paisesrapeo",
            storageBucket: "paisesrapeo.firebasestorage.app",
            messagingSenderId: "228164696308",
            appId: "1:228164696308:web:0bc36465934a71dc78c6a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CONEXIÓN (TikFinity local WebSocket)
        class TikFinityConnection {
            constructor(wsUrl) {
                this.wsUrl = wsUrl;
                this.ws = null;
                this.handlers = {};
                this.uniqueId = null;
            }

            on(eventName, eventHandler) {
                if (!this.handlers[eventName]) this.handlers[eventName] = [];
                this.handlers[eventName].push(eventHandler);
            }

            emitLocal(eventName, payload) {
                const list = this.handlers[eventName] || [];
                list.forEach(fn => {
                    try { fn(payload); } catch (e) { console.error(e); }
                });
            }

            connect(uniqueId) {
                this.uniqueId = uniqueId;

                return new Promise((resolve, reject) => {
                    try {
                        this.ws = new WebSocket(this.wsUrl);
                    } catch (err) {
                        reject("No se pudo abrir WebSocket de TikFinity.");
                        return;
                    }

                    const timeout = setTimeout(() => {
                        reject("Timeout conectando a TikFinity.");
                    }, 15000);

                    this.ws.onopen = () => {
                        // TikFinity suele estar ya conectado desde la app desktop.
                        // Enviamos mensajes de conexión opcionales por compatibilidad.
                        const connectMsgs = [
                            { action: "connect", uniqueId: uniqueId },
                            { event: "setUniqueId", uniqueId: uniqueId },
                            { type: "setUniqueId", uniqueId: uniqueId }
                        ];
                        connectMsgs.forEach(msg => {
                            try { this.ws.send(JSON.stringify(msg)); } catch (_) { }
                        });

                        clearTimeout(timeout);
                        resolve({ roomId: uniqueId || "tikfinity-local" });
                    };

                    this.ws.onerror = () => {
                        clearTimeout(timeout);
                        reject("Error de conexión con TikFinity. Verifica que la app esté abierta.");
                    };

                    this.ws.onmessage = (evt) => {
                        let msg;
                        try {
                            msg = JSON.parse(evt.data);
                        } catch (_) {
                            return;
                        }

                        const eventName = (msg.event || msg.type || msg.eventType || "").toString().toLowerCase();
                        const data = msg.data || msg.payload || msg;
                        const normalized = this.normalizeEvent(eventName, data);
                        if (!normalized) return;
                        this.emitLocal(normalized.name, normalized.data);
                    };

                    this.ws.onclose = () => {
                        this.emitLocal("streamEnd", {});
                    };
                });
            }

            normalizeEvent(eventName, data) {
                const uniqueId = data.uniqueId || data.username || data.user || data.userName || "";
                const nickname = data.nickname || data.nickName || uniqueId || "Usuario";
                const profilePictureUrl = data.profilePictureUrl || data.profilePic || data.avatar || "";

                if (eventName.includes("chat") || eventName.includes("comment")) {
                    return {
                        name: "chat",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            comment: data.comment || data.message || data.text || ""
                        }
                    };
                }

                if (eventName.includes("gift")) {
                    return {
                        name: "gift",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            giftId: Number(data.giftId ?? data.gift_id ?? data.id ?? 0),
                            repeatCount: Number(data.repeatCount ?? data.repeat_count ?? data.count ?? 1),
                            repeatEnd: Boolean(data.repeatEnd ?? data.repeat_end ?? false),
                            groupId: data.groupId ?? data.group_id ?? data.comboId ?? data.combo_id ?? data.msgId ?? data.msg_id ?? ""
                        }
                    };
                }

                if (eventName.includes("like")) {
                    return {
                        name: "like",
                        data: {
                            uniqueId,
                            likeCount: Number(data.likeCount ?? data.count ?? data.likes ?? 1)
                        }
                    };
                }

                if (eventName.includes("follow")) {
                    return { name: "follow", data: { uniqueId } };
                }

                if (eventName.includes("share")) {
                    return { name: "share", data: { uniqueId } };
                }

                return null;
            }
        }

        let connection = new TikFinityConnection("ws://127.0.0.1:21213/");

        $("#connectButton").click(connect);
        $("#uniqueIdInput").on("keyup", e => { if (e.key === "Enter") connect(); });

        let camRot = 0;
        let camMirror = false;

        function applyCamTransform() {
            let scaleX = camMirror ? -1 : 1;
            let rot = camRot;

            if (rot % 180 !== 0) {
                let cw = $('#zona').width();
                let ch = $('#zona').height();
                $('#videoElement').css({
                    width: ch + 'px',
                    height: cw + 'px',
                    left: (cw - ch) / 2 + 'px',
                    top: (ch - cw) / 2 + 'px',
                    transform: `rotate(${rot}deg) scaleX(${scaleX})`
                });
            } else {
                $('#videoElement').css({
                    width: '100%',
                    height: '100%',
                    left: '0',
                    top: '0',
                    transform: `rotate(${rot}deg) scaleX(${scaleX})`
                });
            }
        }

        $(window).resize(() => applyCamTransform());

        $("#camSettingsBtn").click(() => $("#camSettingsPanel").toggle());
        $("#rotateCamBtn").click(() => { camRot = (camRot + 90) % 360; applyCamTransform(); });
        $("#mirrorCamBtn").click(() => { camMirror = !camMirror; applyCamTransform(); });

        $("#cameraButton").click(async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoElement = document.getElementById('videoElement');
                videoElement.srcObject = stream;
                applyCamTransform();
            } catch (err) {
                alert("Error al activar la cámara: " + err.message);
            }
        });

        $("#fullscreenButton").click(() => {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        });

            const giftId = Number(data.giftId);
            const repeatCountRaw = Number(data.repeatCount);

            const groupId = data.groupId || "";
            const key = groupId ? `${data.uniqueId}:${giftId}:${groupId}` : `${data.uniqueId}:${giftId}`;
            
            const previous = giftProgress[key] || 0;
            let effectivePrevious = previous;

            if (!groupId) {
                if (repeatCount === 1 && previous > 1) {
                    effectivePrevious = 0; // Nuevo combo detectado
                } else if (repeatCount < previous) {
                    return; // Mensaje desordenado, ignorar para no sumar extras
                }
            }

            const deltaCount = Math.max(0, repeatCount - effectivePrevious);

            if (deltaCount > 0) {
                giftProgress[key] = repeatCount;
                
                // Limpiar estado después de 5 segundos de inactividad
                if (window['giftTimeout_' + key]) clearTimeout(window['giftTimeout_' + key]);

                $timerDiv.text(formatTime(globalTimerSeconds));

        function addPointToFlag(code, amount = 1) {
            const $flag = $(`#flag-${code}`);
            if ($flag.length === 0) return;

            const $counter = $flag.find(".counter");
            let currentScore = parseInt($counter.text(), 10) || 0;
            $counter.text(currentScore + amount);

            $counter.css("transform", "scale(1.5)");
            setTimeout(() => $counter.css("transform", "scale(1)"), 200);

            spawnParticles($flag);
            
            // Reordenar contenedor
            const $container = $flag.closest('.flags-container');
            sortFlagsContainer($container);
            
            checkLeader();
        }

        function sortFlagsContainer($container) {
            const $items = $container.children(".flag-item");
            if ($items.length <= 1) return;

            // 1. Guardar posiciones actuales
            const firstPositions = {};
            $items.each(function() {
                firstPositions[$(this).attr("data-code")] = this.getBoundingClientRect().top;
            });

            // 2. Ordenar en DOM por puntos descendente
            $items.sort((a, b) => {
                const ptsA = parseInt($(a).find(".counter").text(), 10) || 0;
                const ptsB = parseInt($(b).find(".counter").text(), 10) || 0;
                return ptsB - ptsA;
            });
            $container.append($items);

            // 3. Animar con FLIP
            $items.each(function() {
                const code = $(this).attr("data-code");
                const firstTop = firstPositions[code];
                const lastTop = this.getBoundingClientRect().top;
                const invert = firstTop - lastTop;
                
                if (invert !== 0) {
                    // Mover a posición antigua sin transición
                    $(this).css({
                        transition: 'none',
                        transform: `translateY(${invert}px)`
                    });

                    // Forzar reflow
                    this.offsetHeight;

                    // Mover a nueva posición con transición
                    $(this).css({
                        transition: 'transform 0.5s ease-in-out',
                        transform: 'translateY(0)'
                    });
                } else {
                    $(this).css({
                        transition: 'none',
                        transform: 'translateY(0)'
                    });
                }
            });
        }

            $(".flag-item").removeClass("leader-flag");
            if (max > 0) {

            }
        }

        function spawnParticles($el) {
            const rect = $el.find("img")[0].getBoundingClientRect();

            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const emojis = ["⭐", "✨", "💥", "🔥", "⚡"];

            for (let i = 0; i < 20; i++) {
                const particle = $('<div class="flag-particle"></div>');
                particle.text(emojis[Math.floor(Math.random() * emojis.length)]);
                $("body").append(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 120 + 60;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.css({
                    left: centerX + 'px',
                    top: centerY + 'px',
                    '--tx': tx + 'px',
                    '--ty': ty + 'px',
                });

                setTimeout(() => particle.remove(), 800);
            }
        }

        // ==== LÓGICA DE OVERLAY Y OBS ====
        $("#generateOverlayBtn").click(async () => {
            let user = $("#uniqueIdInput").val().trim().replace("@", "");
            if (!user) {
                alert("Primero escribe tu @usuario para generar el enlace automático.");
                return;
            }

            const btn = $("#generateOverlayBtn");
            const originalText = btn.val();
            btn.val("Verificando...").prop("disabled", true);

            try {
                const snapshot = await db.ref(`licenses/${user}`).once('value');
                let data = snapshot.val();
                let isNew = false;

                if (!data) {
                    data = { tokens: 0, limit: 35000, blocked: false };
                    isNew = true;
                }

                if (data.blocked || (data.tokens || 0) >= (data.limit || 35000)) {
                    alert(`⚠️ LICENCIA DENEGADA para @${user}.\nTokens consumidos: ${data.tokens || 0}\nLímite: ${data.limit || 35000}\nEstado: ${data.blocked ? 'BLOQUEADO' : 'LÍMITE ALCANZADO'}`);
                    return;
                }

                // Actualizar lastActive y guardar datos iniciales si es usuario nuevo
                const updatePayload = {
                    lastActive: firebase.database.ServerValue.TIMESTAMP
                };
                
                if (isNew || typeof data.tokens === 'undefined') updatePayload.tokens = data.tokens || 0;
                if (isNew || typeof data.limit === 'undefined') updatePayload.limit = data.limit || 35000;
                if (isNew || typeof data.blocked === 'undefined') updatePayload.blocked = !!data.blocked;

                db.ref(`licenses/${user}`).update(updatePayload);

                let currentPath = window.location.href.split('?')[0];
                currentPath = currentPath.replace("localhost", "127.0.0.1");
                let overlayUrl = `${currentPath}?user=${user}&overlay=1&obs=.com`;

                // Abre en una nueva ventana/pestaña como TikTok Chat Reader
                window.open(overlayUrl, "_blank");

            } catch (err) {
                alert("Error al verificar licencia: " + err.message);
            } finally {
                btn.val(originalText).prop("disabled", false);
            }
        });

        // Auto-conectar y Modo Transparente (si viene por URL)
        $(document).ready(() => {
            iniciarTemporizadorGlobal(); // Iniciar contador automáticamente
            $("#leftFlagsContainer, #rightFlagsContainer").css("transform", `scale(0.85)`);

            const urlParams = new URLSearchParams(window.location.search);
            const isOverlay = urlParams.get('overlay');
            const autoUser = urlParams.get('user');

            if (isOverlay) {
                // Modo Overlay: oculta video y quita fondos, pero MANTIENE los controles
                $("body").css("background", "transparent");
                $("#zona").css("background", "transparent");
                $("#videoElement").hide();
                $("#exitFullscreenBtn").hide();
            }

            // Conexión automática para el enlace de OBS/Live Studio
            if (autoUser) {
                $("#uniqueIdInput").val(autoUser);
                setTimeout(connect, 1500);
            }
        });

        // TECLAS DE PRUEBA
        document.addEventListener("keydown", e => {
            if (e.key === "w" || e.key === "W") {
                if (globalTimerInterval) clearInterval(globalTimerInterval);
                $("#globalAutoTimer").text("00:00");
                mostrarPodio();
            }
            if (e.key === "1") addRandomPoint();
            if (e.key === "2") mostrarAvisoPais("TEST_USER", "colombia");
        });
    </script>
</body>
